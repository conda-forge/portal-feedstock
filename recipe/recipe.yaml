context:
  name: "portal"
  version: "3.8.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/portal-${{ version }}.tar.gz
  sha256: 5ee9f24e10b729f8e94928038ac146ab74e163623f157b7e0914ccf1c8e2d20d

build:
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - cloudpickle
    - msgpack-python
    - numpy
    - psutil

tests:
  - python:
      imports:
        - portal
      python_version: ${{ python_min }}.*

about:
  homepage: http://github.com/danijar/portal
  summary: Fast and reliable distributed systems in Python
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - noahjutz
